abstract: |
  This book provides a comprehensive, rigorous treatment of prompt engineering,
  context engineering, and agentic system design across multiple LLM platforms.
  Targeting AI engineers, researchers, ML product teams, and SRE/Platform engineers,
  it covers best practices for self-hosted models (vLLM, llama.cpp, Ollama),
  ChatGPT (Custom GPTs and Actions), and Claude (Skills, MCP, Hooks).

  Each chapter follows a structured approach: Problem → Theory → Pattern →
  Implementation → Evaluation → Pitfalls → Checklist. All code examples are
  end-to-end runnable with reproducible environments, security considerations
  (OWASP LLM Top 10), and comprehensive evaluation rubrics.

  The book includes:
  - Empirical evidence for reasoning prompts (CoT, Self-Consistency, ToT, Reflexion)
  - Advanced RAG techniques (HyDE, RAPTOR, Self-RAG)
  - Affective and persona prompting with ethical considerations
  - Platform-specific integration patterns
  - Security, observability, and production deployment practices
  - Runnable labs, templates, and evaluation harnesses
